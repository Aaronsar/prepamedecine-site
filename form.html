<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ta première année santé — PrépaMédecine</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#046bd2;--blue-dark:#0353a4;--blue-light:#e8f2fc;--blue-50:#f0f7ff;
    --green:#10b981;--green-light:#ecfdf5;
    --text:#0f172a;--text-body:#334155;--text-muted:#64748b;--text-light:#94a3b8;
    --border:#e2e8f0;--border-light:#f1f5f9;
    --radius:12px;--radius-lg:16px;--radius-sm:8px;
    --shadow-lg:0 10px 30px rgba(0,0,0,0.08),0 4px 8px rgba(0,0,0,0.04);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;color:var(--text-body);background:var(--blue-50);line-height:1.6;-webkit-font-smoothing:antialiased}
  img{max-width:100%;display:block}

  /* NAV */
  .nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:64px}
  .nav-inner{max-width:600px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
  .nav-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;letter-spacing:-0.4px;display:flex;align-items:center;gap:9px;text-decoration:none}
  .nav-logo img{height:36px;width:auto}
  .nav-logo .logo-text{display:flex;align-items:baseline;gap:0}
  .nav-logo .logo-text em{font-style:normal;color:#1e293b}
  .nav-logo .logo-text span{font-weight:800;color:#1e293b}
  .nav-logo .logo-text .logo-dot{color:#2e6da4;font-weight:900}
  .nav-logo .logo-text .logo-tld{font-weight:700;font-size:14px;color:var(--text-light);margin-left:1px}

  /* SHELL */
  .shell{max-width:600px;margin:0 auto;padding:40px 20px 80px}
  .hero{margin-bottom:28px;text-align:center}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);color:var(--blue-dark);font-size:12.5px;font-weight:700;letter-spacing:.02em;padding:7px 14px;border-radius:999px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-light)}
  h1{font-family:'Inter',sans-serif;font-size:clamp(25px,5.6vw,34px);font-weight:800;color:var(--text);letter-spacing:-0.8px;line-height:1.18;margin-bottom:12px}
  h1 em{font-style:normal;color:var(--blue)}
  .sub{font-size:16px;color:var(--text-muted);max-width:420px;margin:0 auto}

  /* CARD */
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:30px 26px}
  .greeting{font-size:18px;font-weight:700;color:var(--text);margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
  .identity{font-size:13.5px;color:var(--text-muted);margin-bottom:24px;padding-bottom:22px;border-bottom:1px solid var(--border-light)}
  .identity strong{color:var(--text-body);font-weight:600}

  .q{margin-bottom:24px}
  .q:last-of-type{margin-bottom:8px}
  .q-title{font-size:16.5px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:flex-start;gap:9px}
  .q-step{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .options{display:flex;flex-direction:column;gap:10px}
  .yesno{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .opt{display:flex;align-items:center;gap:12px;padding:15px 16px;border:2px solid var(--border);border-radius:var(--radius);background:#fff;font:inherit;font-size:15px;font-weight:600;color:var(--text-body);cursor:pointer;text-align:left;width:100%;transition:border-color .15s,background .15s,box-shadow .15s}
  .opt:hover{border-color:var(--blue);background:var(--blue-50)}
  .opt.selected{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 6px 16px rgba(4,107,210,.25)}
  .opt-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
  .opt:hover .opt-radio{border-color:var(--blue)}
  .opt.selected .opt-radio{border-color:#fff}
  .opt.selected .opt-radio::after{content:'';width:9px;height:9px;border-radius:50%;background:#fff}

  .sub-q{margin-top:18px;padding-top:18px;border-top:1px solid var(--border-light);animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ti{width:100%;font:inherit;font-size:15px;padding:13px 15px;border:2px solid var(--border);border-radius:var(--radius);margin-top:12px;color:var(--text);transition:border-color .15s,box-shadow .15s}
  .ti:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(4,107,210,.1)}

  .submit{width:100%;margin-top:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font:inherit;font-size:16.5px;font-weight:700;padding:16px;cursor:pointer;transition:background .2s,transform .12s,box-shadow .2s;box-shadow:0 6px 18px rgba(4,107,210,.28)}
  .submit:hover:not(:disabled){background:var(--blue-dark);transform:translateY(-1px)}
  .submit:disabled{opacity:.6;cursor:default;transform:none}

  .err{background:#fef2f2;border-left:3px solid var(--red,#ef4444);color:#991b1b;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;margin-bottom:18px}

  .spinner{width:36px;height:36px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:70px auto}
  @keyframes sp{to{transform:rotate(360deg)}}

  .state{text-align:center;padding:24px 8px}
  .state-ic{width:72px;height:72px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 20px;box-shadow:0 8px 24px rgba(16,185,129,.3)}
  .state-err .state-ic{background:#ef4444;box-shadow:0 8px 24px rgba(239,68,68,.3)}
  .state h2{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:10px}
  .state p{font-size:16px;color:var(--text-muted);max-width:380px;margin:0 auto}

  .foot{font-size:12.5px;color:var(--text-light);text-align:center;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:6px}
  .foot svg{flex-shrink:0}

  @media(max-width:480px){.card{padding:24px 18px}.shell{padding:28px 16px 60px}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="https://prepamedecine.fr/" class="nav-logo">
      <img src="/logo-prepamedecine.svg" alt="Logo prepamedecine.fr" width="36" height="38">
      <span class="logo-text"><em>prepa</em><span>medecine</span><span class="logo-dot">.</span><span class="logo-tld">fr</span></span>
    </a>
  </div>
</nav>
<main class="shell">
  <div class="hero">
    <span class="eyebrow"><span class="dot"></span>PrépaMédecine · 30 secondes</span>
    <h1>Dis-nous où tu en es pour ta <em>rentrée en médecine</em></h1>
    <p class="sub">Trois petites questions, c'est tout. On a déjà tes infos, tu n'as rien à ressaisir.</p>
  </div>
  <div id="app"><div class="spinner"></div></div>
  <p class="foot">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Tes données restent confidentielles · PrépaMédecine
  </p>
</main>
<script>
(function(){'use strict';
var PREFILL='https://hub.diploma-sante.fr/api/forms/prefill',SUBMIT='/api/submit-form';
var st={loading:1,error:null,submitting:0,submitted:0,identity:{firstname:'',lastname:'',email:'',phone:'',departement:'',classe_actuelle:''},hubspot_contact_id:null,greeting:'',utm_campaign:'last-chance-medecine',commence:null,prevue:null,choix:null,choixLibre:'',raison:null,raisonLibre:'',err:null};
/* Libellés reformulés (différents) — valeurs (data-v) inchangées, contrat CRM respecté */
var CHOIX=[{v:'medisup',l:'Médisup'},{v:'diploma',l:'Diploma Santé'},{v:'antemed',l:'AnteMed-Epsilon'},{v:'cpcm',l:'CPCM'},{v:'autre',l:'Une autre'}];
var RAISON=[{v:'financier',l:'Un budget trop important'},{v:'pas_le_temps',l:'Je ne m\'y suis pas encore penché'},{v:'pas_utile',l:'Je me sens à l\'aise en solo'},{v:'autre',l:'Autre chose'}];
var app=document.getElementById('app');
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function set(p){Object.assign(st,p);render();}
function ob(g,v,l,sel){return '<button type="button" class="opt'+(sel?' selected':'')+'" data-g="'+g+'" data-v="'+esc(v)+'"><span class="opt-radio"></span><span>'+esc(l)+'</span></button>';}
function step(n){return '<span class="q-step">'+n+'</span>';}
function render(){
  if(st.loading){app.innerHTML='<div class="spinner"></div>';return;}
  if(st.error){app.innerHTML='<div class="card"><div class="state state-err"><div class="state-ic">!</div><h2>Lien invalide</h2><p>'+esc(st.error)+'</p></div></div>';return;}
  if(st.submitted){var pre=st.greeting||st.identity.firstname||'';
    var m=st.commence==='non'?'Merci pour ta réponse\u202F! On te souhaite plein de réussite pour la suite.':'Parfait, on a bien reçu tes réponses\u202F! Un conseiller PrépaMédecine pourra te recontacter pour t\'aiguiller vers la prépa la plus adaptée.';
    app.innerHTML='<div class="card"><div class="state"><div class="state-ic">\u2713</div><h2>Merci '+esc(pre)+'\u202F!</h2><p>'+m+'</p></div></div>';return;}
  var id=st.identity,g=st.greeting||id.firstname||'',h='<div class="card">';
  if(g)h+='<p class="greeting">Salut '+esc(g)+'\u202F!</p>';
  if(st.err)h+='<div class="err">'+esc(st.err)+'</div>';
  /* Q0 (filtre) -> commence_pass_las */
  h+='<div class="q"><h3 class="q-title">'+step(1)+'<span>Tu démarres bien une 1re année PASS ou LAS à la rentrée\u202F?</span></h3><div class="yesno">'+ob('q0','oui','Oui',st.commence==='oui')+ob('q0','non','Non',st.commence==='non')+'</div></div>';
  if(st.commence==='oui'){
    /* Q1 -> prepa_prevue */
    h+='<div class="q"><h3 class="q-title">'+step(2)+'<span>Tu comptes suivre une prépa pour t\'accompagner\u202F?</span></h3><div class="yesno">'+ob('q1','oui','Oui',st.prevue==='oui')+ob('q1','non','Non',st.prevue==='non')+'</div>';
    if(st.prevue==='oui'){h+='<div class="sub-q"><h3 class="q-title"><span>Tu sais déjà laquelle\u202F?</span></h3><div class="options">';CHOIX.forEach(function(c){h+=ob('q2a',c.v,c.l,st.choix===c.v);});h+='</div>';if(st.choix==='autre')h+='<input class="ti" id="cl" placeholder="Précise son nom…" maxlength="200" value="'+esc(st.choixLibre)+'">';h+='</div>';}
    else if(st.prevue==='non'){h+='<div class="sub-q"><h3 class="q-title"><span>Pour quelle raison principalement\u202F?</span></h3><div class="options">';RAISON.forEach(function(c){h+=ob('q2b',c.v,c.l,st.raison===c.v);});h+='</div>';if(st.raison==='autre')h+='<input class="ti" id="rl" placeholder="Dis-nous en deux mots…" maxlength="300" value="'+esc(st.raisonLibre)+'">';h+='</div>';}
    h+='</div>';
  }
  if(st.commence)h+='<button type="button" class="submit" id="sb"'+(st.submitting?' disabled':'')+'>'+(st.submitting?'On enregistre…':(st.commence==='non'?'Valider':'Je valide'))+'</button>';
  h+='</div>';app.innerHTML=h;attach();
}
function attach(){
  app.querySelectorAll('[data-g]').forEach(function(b){b.addEventListener('click',function(){var g=b.dataset.g,v=b.dataset.v;
    if(g==='q0')set({commence:v,prevue:null,choix:null,raison:null,choixLibre:'',raisonLibre:'',err:null});
    else if(g==='q1')set({prevue:v,choix:null,raison:null,choixLibre:'',raisonLibre:'',err:null});
    else if(g==='q2a')set({choix:v,err:null});else if(g==='q2b')set({raison:v,err:null});});});
  var cl=document.getElementById('cl');if(cl)cl.addEventListener('input',function(){st.choixLibre=cl.value;});
  var rl=document.getElementById('rl');if(rl)rl.addEventListener('input',function(){st.raisonLibre=rl.value;});
  var sb=document.getElementById('sb');if(sb)sb.addEventListener('click',submit);
}
function submit(){
  if(st.submitting)return;
  if(!st.commence){set({err:'Réponds à la première question.'});return;}
  var c=st.commence==='oui';
  if(c){
    if(!st.prevue){set({err:'Réponds à la question sur la prépa.'});return;}
    if(st.prevue==='oui'&&!st.choix){set({err:'Indique quelle prépa.'});return;}
    if(st.prevue==='non'&&!st.raison){set({err:'Indique la raison.'});return;}
    if(st.prevue==='oui'&&st.choix==='autre'&&!st.choixLibre.trim()){set({err:'Précise la prépa.'});return;}
    if(st.prevue==='non'&&st.raison==='autre'&&!st.raisonLibre.trim()){set({err:'Précise la raison.'});return;}
  }
  set({submitting:1,err:null});
  var p={firstname:st.identity.firstname,lastname:st.identity.lastname,email:st.identity.email,phone:st.identity.phone,departement:st.identity.departement,classe_actuelle:st.identity.classe_actuelle,hubspot_contact_id:st.hubspot_contact_id,utm_campaign:st.utm_campaign,
    commence_pass_las:st.commence,prepa_prevue:c?st.prevue:null,prepa_choix:(c&&st.prevue==='oui')?st.choix:null,prepa_choix_libre:(c&&st.prevue==='oui'&&st.choix==='autre')?st.choixLibre.trim():null,prepa_non_raison:(c&&st.prevue==='non')?st.raison:null,prepa_non_raison_libre:(c&&st.prevue==='non'&&st.raison==='autre')?st.raisonLibre.trim():null};
  fetch(SUBMIT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
    .then(function(res){if(!res.ok)throw new Error(res.j&&res.j.error?res.j.error:'Erreur serveur');
      if(window.fbq){try{window.fbq('track','Lead',{content_name:'Requalif prepamedecine'});}catch(e){}}
      set({submitted:1,submitting:0});})
    .catch(function(e){set({submitting:0,err:'Une erreur est survenue : '+e.message+'. Réessaie.'});});
}
function fill(v,gr,cid){st.identity={firstname:v.firstname||'',lastname:v.lastname||'',email:v.email||'',phone:v.phone||'',departement:v.departement||'',classe_actuelle:v.classe_actuelle||''};st.greeting=gr||v.firstname||'';if(cid)st.hubspot_contact_id=cid;}
function init(){
  var q=new URLSearchParams(location.search),t=q.get('t');
  if(q.get('utm_campaign'))st.utm_campaign=q.get('utm_campaign');
  var hasQ=q.get('firstname')||q.get('email')||q.get('phone');
  function applyQ(){fill({firstname:q.get('firstname')||'',lastname:q.get('lastname')||'',email:q.get('email')||'',phone:q.get('phone')||'',departement:q.get('departement')||'',classe_actuelle:q.get('classe_actuelle')||''},q.get('firstname')||'',q.get('cid')||null);}
  if(t){fetch(PREFILL+'?t='+encodeURIComponent(t)).then(function(r){return r.json();}).then(function(j){if(!j||!j.ok||!j.values)throw new Error('Lien expiré');fill(j.values,j.greeting,j.hubspot_contact_id);set({loading:0});})
    .catch(function(){if(hasQ){applyQ();set({loading:0});}else set({loading:0,error:'Ce lien n\'est plus valide. Reviens depuis l\'email PrépaMédecine.'});});}
  else if(hasQ){applyQ();set({loading:0});}
  else set({loading:0,error:'Ce formulaire doit être ouvert depuis le lien reçu par email PrépaMédecine.'});
}
init();
})();
</script>
</body>
</html>
