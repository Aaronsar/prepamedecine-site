<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#162d4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" rx="3" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="52" height="52" rx="14" fill="#0284c7"/>
  <path d="M95 107c0-2.5 1.5-4 4-4h7v-15" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M117 107c0-2.5-1.5-4-4-4h-7v-15" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brand name -->
  <text x="146" y="111" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="#fff" font-style="italic">prépa</text>
  <text x="218" y="111" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">médecine</text>
  <text x="394" y="111" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="#38bdf8">.fr</text>

  <!-- Main headline -->
  <text x="100" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff">Toutes les prépas</text>
  <text x="100" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="#38bdf8">médecine en France</text>

  <!-- Subtitle -->
  <text x="100" y="355" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Compare 30+ établissements — PASS, LAS, Terminale Santé</text>

  <!-- Stats cards -->
  <!-- Card 1 -->
  <rect x="100" y="400" width="195" height="100" rx="14" fill="url(#card1)" stroke="#1e4a7a" stroke-width="1"/>
  <rect x="100" y="400" width="195" height="4" rx="2" fill="#0284c7"/>
  <text x="197" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="900" fill="#38bdf8" text-anchor="middle">30+</text>
  <text x="197" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">prépas comparées</text>

  <!-- Card 2 -->
  <rect x="315" y="400" width="195" height="100" rx="14" fill="url(#card1)" stroke="#1e4a7a" stroke-width="1"/>
  <rect x="315" y="400" width="195" height="4" rx="2" fill="#0284c7"/>
  <text x="413" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="900" fill="#38bdf8" text-anchor="middle">26</text>
  <text x="413" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">villes en France</text>

  <!-- Card 3 -->
  <rect x="530" y="400" width="195" height="100" rx="14" fill="url(#card1)" stroke="#1e4a7a" stroke-width="1"/>
  <rect x="530" y="400" width="195" height="4" rx="2" fill="#0ee27a" opacity="0.8"/>
  <text x="628" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="900" fill="#4ade80" text-anchor="middle">100%</text>
  <text x="628" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">gratuit &amp; indépendant</text>

  <!-- Right decorative element -->
  <circle cx="980" cy="315" r="220" fill="#0284c7" opacity="0.05"/>
  <circle cx="980" cy="315" r="160" fill="#0284c7" opacity="0.06"/>
  <circle cx="980" cy="315" r="100" fill="#0284c7" opacity="0.08"/>

  <!-- Stethoscope icon (simplified) -->
  <circle cx="980" cy="280" r="38" fill="none" stroke="#0284c7" stroke-width="6" opacity="0.5"/>
  <path d="M980 318 Q980 360 1010 360 Q1040 360 1040 330" stroke="#0284c7" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="1040" cy="325" r="8" fill="#0284c7" opacity="0.5"/>
  <path d="M965 270 Q965 250 980 250 Q995 250 995 270" stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0284c7" opacity="0.15"/>
  <text x="600" y="615" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">prepamedecine.fr — Le comparateur indépendant des prépas médecine</text>
</svg>
