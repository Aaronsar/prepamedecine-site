<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>PrépaMédecine — Administration</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--wp-sidebar:#1d2327;--wp-sidebar-hover:#2c3338;--wp-sidebar-active:#046bd2;--wp-topbar:#1d2327;--wp-accent:#046bd2;--wp-accent-hover:#0353a4;--wp-green:#00a32a;--wp-green-hover:#008a20;--wp-red:#d63638;--wp-orange:#dba617;--wp-bg:#f0f0f1;--wp-card:#fff;--wp-border:#c3c4c7;--wp-border-light:#e0e0e0;--wp-text:#1d2327;--wp-text-light:#50575e;--wp-text-lighter:#787c82;--wp-sidebar-w:260px;--wp-topbar-h:46px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--wp-bg);color:var(--wp-text);min-height:100vh;font-size:13px}
a{color:var(--wp-accent);text-decoration:none}a:hover{color:var(--wp-accent-hover);text-decoration:underline}

/* Login */
.admin-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--wp-bg)}
.admin-login-card{background:var(--wp-card);border-radius:4px;padding:26px 24px;max-width:340px;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.13);text-align:center}
.admin-login-card h1{font-size:20px;margin:0 0 4px;font-weight:600;color:var(--wp-accent)}
.admin-login-card p{color:var(--wp-text-light);margin:0 0 24px;font-size:13px}
.admin-login-card label{display:block;text-align:left;font-size:13px;font-weight:600;margin-bottom:4px}
.admin-login-card input[type="email"],.admin-login-card input[type="password"]{width:100%;padding:8px 10px;border:1px solid var(--wp-border);border-radius:4px;font-size:14px;margin-bottom:14px;outline:none;font-family:inherit}
.admin-login-card input:focus{border-color:var(--wp-accent);box-shadow:0 0 0 1px var(--wp-accent)}
.btn-login{width:100%;padding:10px;background:var(--wp-accent);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-login:hover{background:var(--wp-accent-hover)}.btn-login:disabled{opacity:.6;cursor:wait}
.login-error{color:var(--wp-red);font-size:13px;margin-top:10px;display:none}

/* Layout */
.admin-layout{display:flex;min-height:100vh}

/* Top bar */
.admin-topbar{position:fixed;top:0;left:0;right:0;height:var(--wp-topbar-h);background:var(--wp-topbar);display:flex;align-items:center;padding:0 16px;z-index:200}
.admin-topbar-left{display:flex;align-items:center;gap:12px;flex:1}
.admin-topbar-left span{color:rgba(255,255,255,.7);font-size:13px}
.admin-topbar-left .logo-text{font-weight:700;font-size:16px;color:#fff;letter-spacing:-.3px}
.admin-topbar-left .logo-text em{color:#4da3ff;font-style:normal}
.admin-topbar-right{display:flex;align-items:center;gap:12px}
.admin-topbar-right .admin-user{color:rgba(255,255,255,.8);font-size:13px}
.admin-topbar-right button{color:rgba(255,255,255,.6);font-size:12px;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:3px;font-family:inherit}
.admin-topbar-right .btn-visit:hover{color:#72aee6;background:rgba(255,255,255,.05)}
.admin-topbar-right .btn-logout:hover{color:#ff8085}

/* Sidebar */
.admin-sidebar{position:fixed;top:var(--wp-topbar-h);left:0;bottom:0;width:var(--wp-sidebar-w);background:var(--wp-sidebar);overflow-y:auto;z-index:100}
.admin-sidebar::-webkit-scrollbar{width:6px}.admin-sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.admin-nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border:none;background:none;color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;text-align:left;transition:all .1s;border-left:3px solid transparent;font-family:inherit}
.admin-nav-item:hover{background:var(--wp-sidebar-hover);color:#fff}
.admin-nav-item.active{background:var(--wp-sidebar-active);color:#fff;border-left-color:#fff}
.admin-nav-item .nav-icon{width:20px;text-align:center;font-size:16px;opacity:.8}
.admin-nav-item .nav-count{margin-left:auto;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:11px;padding:1px 7px;border-radius:10px}
.admin-nav-item .nav-chevron{margin-left:6px;font-size:10px;color:rgba(255,255,255,.4);transition:transform .2s;display:inline-block}
.admin-nav-item .nav-chevron.open{transform:rotate(180deg)}
.admin-subnav{display:none;background:rgba(0,0,0,.15)}.admin-subnav.open{display:block}
.admin-subnav-item{display:block;width:100%;padding:7px 16px 7px 46px;border:none;background:none;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;text-align:left;transition:all .1s;font-family:inherit}
.admin-subnav-item:hover{color:#fff}.admin-subnav-item.active{color:#fff;font-weight:600}

/* Main */
.admin-main{margin-left:var(--wp-sidebar-w);margin-top:var(--wp-topbar-h);padding:20px;flex:1;min-height:calc(100vh - var(--wp-topbar-h))}

/* Dashboard */
.admin-dashboard-home{max-width:1100px}
.admin-welcome{background:var(--wp-card);border:1px solid var(--wp-border-light);border-left:4px solid var(--wp-accent);padding:20px 24px;margin-bottom:20px}
.admin-welcome h2{font-size:22px;font-weight:400;margin-bottom:8px}.admin-welcome p{color:var(--wp-text-light);font-size:14px;line-height:1.5}
.admin-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.admin-stat-card{background:var(--wp-card);border:1px solid var(--wp-border-light);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s}
.admin-stat-card:hover{border-color:var(--wp-accent)}
.admin-stat-card .stat-number{font-size:36px;font-weight:600;color:var(--wp-accent)}.admin-stat-card .stat-label{font-size:13px;color:var(--wp-text-light);margin-top:4px}
.admin-recent{background:var(--wp-card);border:1px solid var(--wp-border-light);padding:0}
.admin-recent-header{padding:12px 16px;border-bottom:1px solid var(--wp-border-light);font-size:14px;font-weight:600}
.admin-recent-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f0f0f1;font-size:13px;cursor:pointer;transition:background .1s}
.admin-recent-item:hover{background:#f6f7f7}.admin-recent-item:last-child{border-bottom:none}
.admin-recent-item .ri-title{flex:1;font-weight:500}.admin-recent-item .ri-cat{font-size:11px;color:var(--wp-text-lighter);background:#f0f0f1;padding:2px 8px;border-radius:3px;margin-left:8px}
.admin-recent-item .ri-date{color:var(--wp-text-lighter);font-size:12px;margin-left:12px}

/* Page list */
.admin-page-list{max-width:1100px}
.admin-page-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.admin-page-list-header h2{font-size:22px;font-weight:400}
.admin-page-list-actions{display:flex;align-items:center;gap:12px}
.list-count{color:var(--wp-text-lighter);font-size:13px}
.admin-table{width:100%;background:var(--wp-card);border:1px solid var(--wp-border-light);border-spacing:0}
.admin-table th{background:#f6f7f7;padding:10px 12px;text-align:left;font-size:13px;font-weight:600;border-bottom:1px solid var(--wp-border-light)}
.admin-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f0f1;vertical-align:middle}
.admin-table tr:hover td{background:#f6f7f7}
.admin-table .page-title-cell{font-weight:600;color:var(--wp-accent);cursor:pointer}
.admin-table .page-title-cell:hover{color:var(--wp-accent-hover)}
.admin-table .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.admin-table .status-dot.published{background:var(--wp-green)}.admin-table .status-dot.draft{background:var(--wp-orange)}
.admin-table .row-actions{color:var(--wp-text-lighter);font-size:12px}.admin-table .row-actions a{margin-right:8px;font-size:12px}
.admin-table .action-delete{color:var(--wp-red)}.admin-table .action-delete:hover{color:#a02022;text-decoration:underline}

/* Score badges */
.score-badge{display:inline-block;min-width:32px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:700;text-align:center;line-height:1.4}
.score-good{background:#dcfce7;color:#166534}.score-mid{background:#fef3c7;color:#92400e}.score-low{background:#fee2e2;color:#991b1b}.score-na{background:#f3f4f6;color:#9ca3af}

/* Editor */
.admin-editor{max-width:860px;animation:adminFade .15s ease}
@keyframes adminFade{from{opacity:0}to{opacity:1}}
.admin-editor-breadcrumb{font-size:12px;color:var(--wp-text-lighter);margin-bottom:16px}.admin-editor-breadcrumb a{color:var(--wp-accent)}
.admin-editor-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.admin-editor-header h2{font-size:22px;font-weight:400;flex:1}
.btn-back{background:none;border:1px solid var(--wp-border);padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--wp-text-light);font-family:inherit}
.btn-back:hover{border-color:var(--wp-text);color:var(--wp-text)}
.admin-editor-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}
.admin-editor-content{min-width:0}
.admin-editor-sidebar{position:sticky;top:calc(var(--wp-topbar-h) + 20px)}

/* Publish box */
.admin-publish-box{background:var(--wp-card);border:1px solid var(--wp-border-light);margin-bottom:16px}
.admin-publish-box-header{padding:10px 14px;background:#f6f7f7;border-bottom:1px solid var(--wp-border-light);font-weight:600;font-size:13px}
.admin-publish-box-body{padding:14px}
.admin-publish-box-body .pub-info{font-size:12px;color:var(--wp-text-light);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.admin-publish-box-body .pub-info strong{color:var(--wp-text)}
.admin-publish-box-footer{padding:10px 14px;border-top:1px solid var(--wp-border-light);display:flex;justify-content:flex-end;gap:8px}

/* Meta box */
.admin-meta-box{background:var(--wp-card);border:1px solid var(--wp-border-light);margin-bottom:16px}
.admin-meta-box-header{padding:10px 14px;background:#f6f7f7;border-bottom:1px solid var(--wp-border-light);font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.admin-meta-box-header .toggle-icon{font-size:10px;transition:transform .2s}
.admin-meta-box-header.collapsed .toggle-icon{transform:rotate(-90deg)}
.admin-meta-box-body{padding:14px}.admin-meta-box.collapsed .admin-meta-box-body{display:none}

/* Form fields */
.admin-field{margin-bottom:14px}.admin-field:last-child{margin-bottom:0}
.admin-field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--wp-text)}
.admin-field input[type="text"],.admin-field input[type="number"],.admin-field input[type="url"],.admin-field textarea,.admin-field select{width:100%;padding:6px 8px;border:1px solid var(--wp-border);border-radius:4px;font-size:13px;font-family:inherit;outline:none;transition:border-color .1s;background:#fff}
.admin-field input:focus,.admin-field textarea:focus,.admin-field select:focus{border-color:var(--wp-accent);box-shadow:0 0 0 1px var(--wp-accent)}
.admin-field textarea{min-height:80px;resize:vertical}
.admin-field-hint{font-size:11px;color:var(--wp-text-lighter);margin-top:3px}

/* Content section */
.admin-content-section{background:#fff;border:1px solid var(--wp-border-light);padding:14px;margin-bottom:8px;position:relative}
.btn-rm-section{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--wp-red);cursor:pointer;font-size:16px}

/* FAQ */
.admin-faq-item{background:#fff;border:1px solid var(--wp-border-light);padding:14px;margin-bottom:8px;position:relative}
.admin-faq-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--wp-red);cursor:pointer;font-size:16px}

/* Buttons */
.btn-add{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--wp-border);border-radius:3px;background:#f6f7f7;color:var(--wp-text-light);font-size:12px;cursor:pointer;margin-top:6px;font-family:inherit}
.btn-add:hover{border-color:var(--wp-text-light);color:var(--wp-text)}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:var(--wp-accent);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:var(--wp-accent-hover)}.btn-primary:disabled{opacity:.6;cursor:wait}
.btn-secondary{display:inline-flex;align-items:center;padding:6px 16px;background:none;color:var(--wp-text-light);border:1px solid var(--wp-border);border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-secondary:hover{border-color:var(--wp-text);color:var(--wp-text)}

/* Score panel */
.admin-score-panel{background:var(--wp-card);border:1px solid var(--wp-border-light);border-radius:4px;margin-top:12px}
.score-panel-body{padding:12px}
.score-summary{display:flex;gap:12px;margin-bottom:12px}
.score-row{flex:1;display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f9fafb;border-radius:6px;font-weight:600;font-size:13px}
.btn-improve{width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer;background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:13px;font-weight:600;font-family:inherit}
.btn-improve:hover{opacity:.9}
.score-checks{margin-top:12px;border-top:1px solid #f0f0f1;padding-top:8px}
.score-check{font-size:12px;padding:3px 0;display:flex;gap:6px;align-items:baseline}
.score-check.pass{color:#166534}.score-check.fail{color:#991b1b}
.score-check-label{font-size:10px;color:#787c82;text-transform:uppercase;letter-spacing:.5px;margin-top:8px;margin-bottom:2px;font-weight:700}

/* Modal */
.admin-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:10000;animation:adminFade .15s}
.admin-modal{background:var(--wp-card);border-radius:4px;padding:24px;width:440px;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.admin-modal-wide{width:560px}
.admin-modal h3{font-size:18px;font-weight:600;margin-bottom:20px}
.admin-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--wp-border-light)}

/* AI source */
.ai-source-section{margin-top:16px;padding:16px;background:linear-gradient(135deg,#f3f0ff,#eef2ff);border:1px solid #d4c8f5;border-radius:6px}
.ai-source-header{font-size:14px;font-weight:700;color:#5b21b6;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ai-source-section .admin-field{margin-bottom:10px}.ai-source-section .admin-field:last-child{margin-bottom:0}
.ai-source-section select{width:100%;padding:7px 10px;border:1px solid #c4b5fd;border-radius:4px;font-size:13px;background:#fff;cursor:pointer;font-family:inherit}
.ai-source-section select:focus{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.15);outline:none}
.ai-source-section input[type="url"]{border-color:#c4b5fd}.ai-source-section input[type="url"]:focus{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.15)}
.btn-ai-generate{background:linear-gradient(135deg,#7c3aed,#6d28d9)!important}.btn-ai-generate:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6)!important}
.btn-ai-regen{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-left:auto}
.btn-ai-regen:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6);box-shadow:0 2px 8px rgba(124,58,237,.3)}

/* AI Overlay */
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:10001;animation:adminFade .15s}
.ai-overlay-content{background:#fff;border-radius:12px;padding:40px 50px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.ai-overlay-content p{font-size:16px;color:var(--wp-text);margin-top:20px;line-height:1.6}
.ai-overlay-content small{color:var(--wp-text-lighter)}
.ai-spinner{width:48px;height:48px;border:4px solid #e5e7eb;border-top:4px solid #7c3aed;border-radius:50%;animation:aiSpin .8s linear infinite;margin:0 auto}
@keyframes aiSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* Toast */
.admin-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--wp-sidebar);color:#fff;padding:10px 20px;border-radius:4px;font-size:13px;z-index:10000;opacity:0;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.admin-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.admin-toast.error{background:var(--wp-red)}.admin-toast.success{background:var(--wp-green)}

/* Published toggle */
.toggle-switch{position:relative;display:inline-block;width:42px;height:22px;margin-left:8px;vertical-align:middle}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:22px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--wp-green)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px)}

/* Responsive */
@media(max-width:960px){.admin-editor-layout{grid-template-columns:1fr}.admin-editor-sidebar{position:static}.admin-stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.admin-sidebar{display:none}.admin-main{margin-left:0}}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:28px 0;border-radius:var(--radius,8px)}
  .table-scroll table,.table-scroll .stats-table{margin:0;width:100%;min-width:500px}
  body{overflow-x:hidden}
</style>
</head>

function calculateSEO(d){
  if(!d)return 0;var score=0;var t=d.title||'';var md=d.meta_description||'';var secs=d.sections||[];var faq=d.faq||[];
  if(t.length>0)score+=5;if(t.length>=50&&t.length<=65)score+=15;else if(t.length>0)score+=Math.max(0,15-Math.abs(t.length-57)*.5);
  if(md.length>0)score+=5;if(md.length>=140&&md.length<=160)score+=15;else if(md.length>0)score+=Math.max(0,15-Math.abs(md.length-150)*.3);
  if(d.subtitle)score+=5;
  var filled=secs.filter(function(s){return s.html&&s.html.length>30});score+=Math.min(15,filled.length*5);
  var headed=secs.filter(function(s){return s.heading&&s.heading.length>0});score+=Math.min(10,headed.length*(10/Math.max(secs.length,1)));
  var tw=0;secs.forEach(function(s){tw+=countWords(s.html)});score+=Math.min(15,Math.round((tw/800)*15));
  if(faq.length>0)score+=10;if(faq.length>=3)score+=5;
  return Math.min(100,Math.round(score));
}

function calculateGEO(d){
  if(!d)return 0;var score=0;var secs=d.sections||[];var faq=d.faq||[];
  score+=Math.min(25,faq.length*5);
  var tw=0;var allH='';secs.forEach(function(s){tw+=countWords(s.html);allH+=(s.html||'')});
  score+=Math.min(20,Math.round((tw/1500)*20));
  var headed=secs.filter(function(s){return s.heading&&s.heading.length>0});score+=Math.min(15,headed.length*3);
  if(/<(ul|ol)\b/i.test(allH))score+=15;
  score+=Math.min(10,secs.length*2);
  var detailed=faq.filter(function(f){return(f.answer||'').length>50});score+=Math.min(15,detailed.length*3);
  return Math.min(100,Math.round(score));
}

function scoreBadge(val){var cls=val<50?'score-low':val<=75?'score-mid':'score-good';return'<span class="score-badge '+cls+'">'+val+'</span>'}

/* Init */
function init(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  loadLockoutState();
  checkSession();
}

async function checkSession(){
  var r=await sb.auth.getSession();
  if(r.data.session){
    var email=r.data.session.user.email;
    if(!isAdminEmail(email)){
      await sb.auth.signOut();
      showLogin('Acces non autorise pour ce compte.');
      return;
    }
    document.getElementById('admin-user-email').textContent=email;
    startInactivityTimer();
    showDashboard();
  }else{showLogin()}
}

/* Security: check admin email */
function isAdminEmail(email){
  return ADMIN_EMAILS.indexOf(email.toLowerCase())!==-1;
}

/* Security: rate limiting persistence */
function loadLockoutState(){
  try{
    var stored=localStorage.getItem('admin_lockout');
    if(stored){
      var data=JSON.parse(stored);
      loginAttempts=data.attempts||0;
      lockoutUntil=data.until||0;
      if(Date.now()>lockoutUntil){loginAttempts=0;lockoutUntil=0;localStorage.removeItem('admin_lockout');}
    }
  }catch(e){}
}
function saveLockoutState(){
  try{localStorage.setItem('admin_lockout',JSON.stringify({attempts:loginAttempts,until:lockoutUntil}));}catch(e){}
}
function clearLockoutState(){
  loginAttempts=0;lockoutUntil=0;
  try{localStorage.removeItem('admin_lockout');}catch(e){}
}

/* Security: inactivity auto-logout */
function startInactivityTimer(){
  clearInactivityTimer();
  var events=['mousedown','keydown','scroll','touchstart'];
  function resetTimer(){
    clearTimeout(inactivityTimer);
    inactivityTimer=setTimeout(autoLogout,INACTIVITY_TIMEOUT_MS);
  }
  events.forEach(function(ev){document.addEventListener(ev,resetTimer,{passive:true});});
  resetTimer();
}
function clearInactivityTimer(){
  if(inactivityTimer){clearTimeout(inactivityTimer);inactivityTimer=null;}
}
async function autoLogout(){
  clearInactivityTimer();
  await sb.auth.signOut();
  alert('Session expiree par inactivite. Veuillez vous reconnecter.');
  location.reload();
}

/* Login */
function showLogin(msg){
  document.getElementById('admin-login').style.display='flex';
  document.getElementById('admin-dashboard').style.display='none';
  var err=document.getElementById('login-error');
  if(msg){err.textContent=msg;err.style.display='block';}
  document.getElementById('login-form').onsubmit=async function(e){
    e.preventDefault();
    var email=document.getElementById('login-email').value.trim().toLowerCase();
    var pass=document.getElementById('login-password').value;
    var btn=this.querySelector('.btn-login');
    err.style.display='none';

    /* Check lockout */
    if(lockoutUntil>Date.now()){
      var mins=Math.ceil((lockoutUntil-Date.now())/60000);
      err.textContent='Trop de tentatives. Reessayez dans '+mins+' min.';
      err.style.display='block';
      return;
    }

    /* Check admin whitelist before even attempting auth */
    if(!isAdminEmail(email)){
      loginAttempts++;
      if(loginAttempts>=MAX_LOGIN_ATTEMPTS){
        lockoutUntil=Date.now()+LOCKOUT_DURATION_MS;
        saveLockoutState();
        err.textContent='Compte bloque pour 15 minutes.';
      }else{
        saveLockoutState();
        err.textContent='Acces refuse.';
      }
      err.style.display='block';
      return;
    }

    btn.disabled=true;
    var result=await sb.auth.signInWithPassword({email:email,password:pass});
    if(result.error){
      loginAttempts++;
      if(loginAttempts>=MAX_LOGIN_ATTEMPTS){
        lockoutUntil=Date.now()+LOCKOUT_DURATION_MS;
        saveLockoutState();
        err.textContent='Trop de tentatives. Compte bloque 15 minutes.';
      }else{
        saveLockoutState();
        var remaining=MAX_LOGIN_ATTEMPTS-loginAttempts;
        err.textContent='Identifiants incorrects. '+remaining+' tentative'+(remaining>1?'s':'')+' restante'+(remaining>1?'s':'')+'.';
      }
      err.style.display='block';btn.disabled=false;return;
    }

    clearLockoutState();
    document.getElementById('admin-user-email').textContent=email;
    startInactivityTimer();
    showDashboard();
  };
}

async function loadCompetitorArticles(){
  var sel=document.getElementById('ai-competitor-select');
  if(!sel)return;
  if(competitorCache){renderCompetitorSelect(sel,competitorCache);return}
  try{
    var res=await fetch(SUPABASE_URL+'/functions/v1/fetch-competitor-articles');
    var data=await res.json();
    if(data.sources){competitorCache=data.sources;renderCompetitorSelect(sel,data.sources)}
    else{sel.innerHTML='<option value="">Erreur de chargement</option>'}
  }catch(e){console.error(e);sel.innerHTML='<option value="">Erreur de chargement</option>'}
}

function renderCompetitorSelect(sel,sources){
  var html='<option value="">-- Choisir un article concurrent --</option>';
  sources.forEach(function(src){
    if(src.articles.length===0)return;
    html+='<optgroup label="'+esc(src.site)+' ('+src.articles.length+' articles)">';
    src.articles.forEach(function(a){
      var t=a.title.length>70?a.title.substring(0,67)+'...':a.title;
      html+='<option value="'+esc(a.url)+'">'+esc(t)+'</option>';
    });
    html+='</optgroup>';
  });
  sel.innerHTML=html;
}

window.closeAddModal=function(){var m=document.getElementById('add-modal');if(m)m.remove()};

window.createArticle=async function(){
  var title=document.getElementById('new-title').value.trim();
  var category=document.getElementById('new-category').value.trim();
  if(!title){showToast('Titre requis','error');return}

  var slug=title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  var sourceUrl=(document.getElementById('ai-source-url').value||'').trim();
  var useAI=!!(sourceUrl||title);

  var btn=document.querySelector('#add-modal .btn-primary');
  btn.disabled=true;
  if(useAI){btn.innerHTML='&#129302; Generation IA...';showAIOverlay('Generation de l\'article en cours...<br><small>Cela peut prendre 20-30 secondes</small>')}
  else btn.textContent='Creation...';

  try{
    var insertData={slug:slug,title:title,category:category,icon_name:'fileText',published:false};
    var r=await sb.from(TABLE).insert(insertData).select().single();
    if(r.error)throw r.error;
    var newId=r.data.id;

    if(useAI){
      try{
        var existing=articlesCache.map(function(a){return{title:a.title,slug:a.slug}});
        var aiRes=await fetch(SUPABASE_URL+'/functions/v1/generate-article',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({title:title,source_url:sourceUrl,existing_articles:existing})
        });
        var aiData=await aiRes.json();
        if(aiData.error){showToast('IA: '+aiData.error+' -- article cree vide','error')}
        else{
          var update={title:aiData.title||title,meta_description:aiData.meta_description||null,subtitle:aiData.subtitle||null,sections:aiData.sections||[],faq:aiData.faq||[]};
          await sb.from(TABLE).update(update).eq('id',newId);
          showToast('Article genere par l\'IA','success');
        }
      }catch(aiErr){console.error(aiErr);showToast('Erreur IA -- article cree vide','error')}
    }

    hideAIOverlay();closeAddModal();
    await loadArticles();
    if(!useAI)showToast('Article "'+title+'" cree','success');
    editArticle(newId);
  }catch(err){
    hideAIOverlay();showToast('Erreur : '+(err.message||'Echec'),'error');
    btn.disabled=false;btn.textContent='Creer';
  }
};

/* AI Overlay */
function showAIOverlay(msg){
  if(document.getElementById('ai-overlay'))return;
  document.body.insertAdjacentHTML('beforeend','<div id="ai-overlay" class="ai-overlay"><div class="ai-overlay-content"><div class="ai-spinner"></div><p>'+msg+'</p></div></div>');
}
function hideAIOverlay(){var el=document.getElementById('ai-overlay');if(el)el.remove()}

/* Regenerate */
window.regenerateArticle=async function(){
  if(!state.currentId)return;
  var title=document.querySelector('[name="title"]');
  if(!title||!title.value.trim()){showToast('Titre requis','error');return}
  if(!confirm('Regenerer l\'article avec l\'IA ? Le contenu actuel sera remplace.'))return;
  showAIOverlay('Regeneration en cours...<br><small>~20-30 secondes</small>');
  try{
    var existing=articlesCache.filter(function(a){return a.id!==state.currentId}).map(function(a){return{title:a.title,slug:a.slug}});
    var aiRes=await fetch(SUPABASE_URL+'/functions/v1/generate-article',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:title.value.trim(),existing_articles:existing})
    });
    var aiData=await aiRes.json();
    if(aiData.error){hideAIOverlay();showToast('Erreur IA: '+aiData.error,'error');return}
    var update={title:aiData.title||title.value.trim(),meta_description:aiData.meta_description||null,subtitle:aiData.subtitle||null,sections:aiData.sections||[],faq:aiData.faq||[]};
    var r=await sb.from(TABLE).update(update).eq('id',state.currentId);
    if(r.error)throw r.error;
    hideAIOverlay();showToast('Article regenere','success');
    await loadArticles();editArticle(state.currentId);
  }catch(err){hideAIOverlay();showToast('Erreur : '+(err.message||'Echec'),'error')}
};

/* Improve */
window.improveArticle=async function(){
  if(!state.currentId)return;
  var d=collectFormData();
  if(!d.title){showToast('Titre requis','error');return}
  if(!confirm('Ameliorer l\'article avec l\'IA ? Le contenu sera reecrit.'))return;
  var seo=calculateSEO(d);var geo=calculateGEO(d);
  showAIOverlay('Amelioration en cours...<br><small>~30-40 secondes</small>');
  try{
    var aiRes=await fetch(SUPABASE_URL+'/functions/v1/improve-article',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:d.title,meta_description:d.meta_description,subtitle:d.subtitle,sections:d.sections,faq:d.faq,scores:{seo:seo,geo:geo}})
    });
    var aiData=await aiRes.json();
    if(aiData.error){hideAIOverlay();showToast('Erreur IA: '+aiData.error,'error');return}
    var update={title:aiData.title||d.title,meta_description:aiData.meta_description||null,subtitle:aiData.subtitle||null,sections:aiData.sections||[],faq:aiData.faq||[]};
    var r=await sb.from(TABLE).update(update).eq('id',state.currentId);
    if(r.error)throw r.error;
    hideAIOverlay();showToast('Article ameliore','success');
    await loadArticles();editArticle(state.currentId);
  }catch(err){hideAIOverlay();showToast('Erreur : '+(err.message||'Echec'),'error')}
};

/* Score panel */
var _scoreTimer=null;

function collectFormData(){
  var d={title:getVal('title'),meta_description:getVal('meta_description'),subtitle:getVal('subtitle'),sections:[],faq:[]};
  document.querySelectorAll('#sections-list .admin-content-section').forEach(function(el){
    var h=el.querySelector('[name^="section_heading_"]');var c=el.querySelector('[name^="section_html_"]');
    d.sections.push({heading:h?h.value.trim():'',html:c?c.value.trim():''});
  });
  document.querySelectorAll('#faq-list .admin-faq-item').forEach(function(el){
    var q=el.querySelector('[name^="faq_q_"]');var a=el.querySelector('[name^="faq_a_"]');
    if(q||a)d.faq.push({question:q?q.value.trim():'',answer:a?a.value.trim():''});
  });
  return d;
}

function updateScorePanel(){
  var panel=document.getElementById('score-panel');if(!panel)return;
  var d=collectFormData();var seo=calculateSEO(d);var geo=calculateGEO(d);
  document.getElementById('score-summary').innerHTML='<div class="score-row"><span>SEO</span>'+scoreBadge(seo)+'</div><div class="score-row"><span>GEO</span>'+scoreBadge(geo)+'</div>';

  var t=d.title||'';var md=d.meta_description||'';var secs=d.sections||[];var faq=d.faq||[];
  var filled=secs.filter(function(s){return s.html&&s.html.length>30});
  var headed=secs.filter(function(s){return s.heading&&s.heading.length>0});
  var tw=0;var allH='';secs.forEach(function(s){tw+=countWords(s.html);allH+=(s.html||'')});
  var hasList=/<(ul|ol)\b/i.test(allH);
  var detailed=faq.filter(function(f){return(f.answer||'').length>50});

  var c='<div class="score-check-label">SEO</div>';
  c+=chk(t.length>=50&&t.length<=65,'Titre '+t.length+'/50-65 car.',t.length>0?'Titre : '+t.length+' car. (ideal 50-65)':'Titre manquant');
  c+=chk(md.length>=140&&md.length<=160,'Meta '+md.length+'/140-160 car.',md.length>0?'Meta : '+md.length+' car. (ideal 140-160)':'Meta description manquante');
  c+=chk(!!d.subtitle,'Sous-titre present','Sous-titre manquant');
  c+=chk(filled.length>=3,filled.length+' sections avec contenu','Moins de 3 sections ('+filled.length+')');
  c+=chk(headed.length>=secs.length&&secs.length>0,'Toutes sections ont un titre',(secs.length-headed.length)+' section(s) sans titre');
  c+=chk(tw>=800,tw+' mots (min. 800)',tw+' mots (min. 800)');
  c+=chk(faq.length>=3,faq.length+' questions FAQ',faq.length>0?faq.length+' FAQ (min. 3)':'Pas de FAQ');
  c+='<div class="score-check-label">GEO</div>';
  c+=chk(faq.length>=5,faq.length+'/5 questions FAQ',faq.length+'/5 questions FAQ min');
  c+=chk(tw>=1500,tw+' mots (min. 1500)',tw+'/1500 mots min');
  c+=chk(hasList,'Listes HTML presentes','Pas de listes (ul/ol)');
  c+=chk(secs.length>=5,secs.length+'/5 sections min',secs.length+'/5 sections min');
  c+=chk(detailed.length>=faq.length&&faq.length>0,'Reponses FAQ detaillees',detailed.length+'/'+faq.length+' reponses detaillees');
  document.getElementById('score-checks').innerHTML=c;
}

function chk(pass,good,bad){return'<div class="score-check '+(pass?'pass':'fail')+'"><span>'+(pass?'&#10003;':'&#10007;')+'</span><span>'+(pass?good:bad)+'</span></div>'}

function bindScoreUpdates(){
  var content=document.querySelector('.admin-editor-content');if(!content)return;
  content.addEventListener('input',function(){clearTimeout(_scoreTimer);_scoreTimer=setTimeout(updateScorePanel,500)});
  ['sections-list','faq-list'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    new MutationObserver(function(){clearTimeout(_scoreTimer);_scoreTimer=setTimeout(updateScorePanel,300)}).observe(el,{childList:true});
  });
}

/* Save */
function getVal(n){var el=document.querySelector('[name="'+n+'"]');return el?el.value.trim():''}

window.saveArticle=async function(){
  var btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Sauvegarde...';
  try{
    var d=collectFormData();
    var data={
      title:d.title||null,meta_description:d.meta_description||null,subtitle:d.subtitle||null,
      category:getVal('category')||null,icon_name:getVal('icon_name')||'fileText',
      sections:d.sections,faq:d.faq,
      published:document.getElementById('toggle-published').checked,
      updated_at:new Date().toISOString()
    };
    var r=await sb.from(TABLE).update(data).eq('id',state.currentId);
    if(r.error)throw r.error;
    state.unsaved=false;
    await loadArticles();
    showToast('Modifications enregistrees','success');
  }catch(err){console.error(err);showToast('Erreur : '+(err.message||'Echec'),'error')}
  btn.disabled=false;btn.textContent='Mettre a jour';
};

/* Collect prepa form data */
function collectPrepaData(){
  var d={};
  d.name=getVal('p_name');d.slug=getVal('p_slug');d.ville=getVal('p_ville');
  d.villes=getVal('p_villes').split(',').map(function(v){return v.trim()}).filter(Boolean);
  d.taux=getVal('p_taux');d.anciennete=getVal('p_anciennete');d.etudiants=getVal('p_etudiants');
  d.format=getVal('p_format');d.intro=getVal('p_intro');d.avis=getVal('p_avis');
  d.filieres=[];document.querySelectorAll('.p_filiere:checked').forEach(function(cb){d.filieres.push(cb.value)});
  d.tags=getVal('p_tags').split(',').map(function(t){return t.trim()}).filter(Boolean);
  d.stats=[];document.querySelectorAll('#prepa-stats-list .admin-content-section').forEach(function(el,i){
    var v=el.querySelector('[name^="ps_val_"]');var l=el.querySelector('[name^="ps_lbl_"]');
    if(v&&l)d.stats.push({val:v.value.trim(),lbl:l.value.trim()});
  });
  d.modele=[];document.querySelectorAll('#prepa-modele-list .admin-content-section').forEach(function(el){
    var t=el.querySelector('[name^="pm_t_"]');var dd=el.querySelector('[name^="pm_d_"]');
    if(t&&dd)d.modele.push({t:t.value.trim(),d:dd.value.trim()});
  });
  d.pedagogie=[];document.querySelectorAll('#prepa-pedagogie-list .admin-content-section').forEach(function(el){
    var t=el.querySelector('[name^="pp_t_"]');var dd=el.querySelector('[name^="pp_d_"]');
    if(t&&dd)d.pedagogie.push({t:t.value.trim(),d:dd.value.trim()});
  });
  d.extra_sections=[];document.querySelectorAll('#prepa-extra-list > .admin-content-section').forEach(function(secEl,i){
    var title=secEl.querySelector('[name^="pe_title_"]');
    var blocks=[];
    secEl.querySelectorAll('.admin-faq-item').forEach(function(bEl){
      var bt=bEl.querySelector('[name^="pe_bt_"]');var bd=bEl.querySelector('[name^="pe_bd_"]');
      if(bt&&bd)blocks.push({t:bt.value.trim(),d:bd.value.trim()});
    });
    d.extra_sections.push({title:title?title.value.trim():'',blocks:blocks});
  });
  d.published=document.getElementById('toggle-p-published').checked;
  d.featured=document.getElementById('toggle-p-featured').checked;
  d.coup_de_coeur=document.getElementById('toggle-p-coeur').checked;
  return d;
}

  var html='<div class="admin-modal-overlay" id="add-prepa-modal" onclick="if(event.target===this)this.remove()">';
  html+='<div class="admin-modal"><h3>Nouvelle prepa</h3>';
  html+='<div class="admin-field"><label>Nom</label><input type="text" id="new-prepa-name" placeholder="Ex: Ma Prepa Sante" autofocus></div>';
  html+='<div class="admin-field"><label>Ville</label><input type="text" id="new-prepa-ville" placeholder="Ex: Paris"></div>';
  html+='<div class="admin-field"><label>Format</label><select id="new-prepa-format"><option>Présentiel</option><option>En ligne</option><option>Hybride</option></select></div>';
  html+='<div class="admin-modal-actions">';
  html+='<button class="btn-secondary" onclick="document.getElementById(\'add-prepa-modal\').remove()">Annuler</button>';
  html+='<button class="btn-primary" onclick="createPrepa()">Creer</button>';
  html+='</div></div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  document.getElementById('new-prepa-name').focus();
};

window.createPrepa=async function(){
  var name=document.getElementById('new-prepa-name').value.trim();
  var ville=document.getElementById('new-prepa-ville').value.trim();
  var format=document.getElementById('new-prepa-format').value;
  if(!name){showToast('Nom requis','error');return}
  var slug=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  try{
    var r=await sb.from(TABLE_PREPAS).insert({slug:slug,name:name,ville:ville,villes:ville?[ville]:[],format:format,published:true}).select().single();
    if(r.error)throw r.error;
    document.getElementById('add-prepa-modal').remove();
    await loadPrepas();showToast('Prepa "'+name+'" creee','success');
    editPrepa(r.data.id);
  }catch(err){showToast('Erreur : '+(err.message||'Echec'),'error')}
};

/* Helpers */
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatDate(iso){if(!iso)return'--';var d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}
function showToast(msg,type){var t=document.getElementById('admin-toast');t.textContent=msg;t.className='admin-toast'+(type?' '+type:'');setTimeout(function(){t.classList.add('show')},10);setTimeout(function(){t.classList.remove('show')},3000)}

/* Start */
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
